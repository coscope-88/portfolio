<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="투자관리">
<meta name="theme-color" content="#185FA5">
<title>투자관리</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#F7F6F2; --surface:#FFFFFF; --surface-1:#F1EFE8;
    --text:#2C2C2A; --text-secondary:#5F5E5A; --text-muted:#888780;
    --border:#E4E2D9; --border-strong:#D3D1C7;
    --accent:#185FA5; --accent-bg:#E6F1FB;
    --success:#27500A; --success-bg:#EAF3DE;
    --danger:#791F1F; --danger-bg:#FCEBEB;
    --warn:#633806; --warn-bg:#FAEEDA;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:"Malgun Gothic","맑은 고딕",-apple-system,sans-serif; background:var(--bg); color:var(--text);}
  .app{display:flex; min-height:100vh;}
  nav{width:120px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); padding:1rem 0; position:sticky; top:0; align-self:flex-start; max-height:100vh; overflow-y:auto;}
  .brand{display:flex; flex-direction:column; align-items:center; gap:2px; padding:0 8px 14px; margin-bottom:8px; border-bottom:1px solid var(--border); text-align:center;}
  .brand-symbol-img{width:74px; height:auto; display:block; margin:0 auto 6px;}
  .brand-sub{font-size:10px; color:var(--text-muted); letter-spacing:.5px;}
  .brand-title{font-size:12px; font-weight:bold; color:var(--text); line-height:1.35;}
  .brand-title-accent{color:var(--accent);}
  .nav-item{display:flex; flex-direction:column; align-items:center; gap:4px; padding:12px 6px; font-size:12px; color:var(--text-secondary); cursor:pointer; user-select:none;}
  .nav-item.active{background:var(--accent-bg); color:var(--accent); font-weight:bold;}
  .nav-item:hover{background:var(--surface-1);}
  main{flex:1; padding:1.25rem; min-width:0;}
  .row{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .row.between{justify-content:space-between;}
  select, input, button{
    font-family:inherit; font-size:13px; padding:8px 10px; border:1px solid var(--border-strong);
    border-radius:var(--radius); background:var(--surface); color:var(--text);
  }
  button{cursor:pointer; display:inline-flex; align-items:center; gap:6px;}
  button:hover{background:var(--surface-1);}
  button.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
  .chip{font-size:12px; padding:5px 12px; border-radius:16px; border:1px solid var(--border-strong); color:var(--text-secondary); cursor:pointer;}
  .chip.active{background:var(--accent-bg); color:var(--accent); border-color:var(--accent);}
  .cards{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:12px; margin:1rem 0;}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem;}
  .card .label{font-size:12px; color:var(--text-secondary); margin:0 0 4px;}
  .card .value{font-size:22px; font-weight:bold; margin:0;}
  .value.up{color:var(--success);}
  .value.down{color:var(--danger);}
  .panel{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1rem;}
  .list-row{display:flex; align-items:center; justify-content:space-between; padding:10px 4px; border-bottom:1px solid var(--border);}
  .list-row:last-child{border-bottom:none;}
  .muted{color:var(--text-muted); font-size:12px;}
  .placeholder{padding:3rem; text-align:center; color:var(--text-muted);}
  .warn-box{background:var(--warn-bg); color:var(--warn); font-size:12px; font-weight:bold; padding:10px 12px 10px 14px; border-radius:var(--radius); margin:10px 0; border:1px solid var(--warn); border-left:5px solid var(--warn); box-shadow:0 2px 8px rgba(99,56,6,0.18); line-height:1.6;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  h2{font-size:16px; margin:0 0 8px;}
  .legend-row{display:flex; align-items:center; justify-content:space-between; font-size:13px; padding:4px 0;}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px;}
  #toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; padding:10px 18px; border-radius:8px; font-size:13px; display:none; z-index:50; max-width:min(92vw,560px); white-space:normal; line-height:1.5; box-shadow:0 4px 16px rgba(0,0,0,0.25);}
  .tabbar{display:flex; border-bottom:1px solid var(--border); margin-bottom:14px; flex-wrap:wrap; position:sticky; top:0; background:var(--bg); z-index:5;}
  .tab{padding:10px 16px; font-size:13px; color:var(--text-secondary); cursor:pointer;}
  .tab.active{color:var(--accent); border-bottom:2px solid var(--accent); font-weight:bold;}
  .crud-table{width:100%; border-collapse:collapse; font-size:13px;}
  .crud-table th{text-align:left; padding:6px 4px; border-bottom:1px solid var(--border); color:var(--text-secondary); font-weight:normal; font-size:12px;}
  .crud-table td{padding:6px 4px; border-bottom:1px solid var(--border); vertical-align:middle;}
  .icon-btn{background:none; border:none; cursor:pointer; padding:2px 6px; font-size:14px;}
  .icon-btn:hover{background:var(--surface-1); border-radius:6px;}
  .mini-input{width:100%; padding:5px 6px; font-size:12px;}
</style>
</head>
<body>
<div class="app">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<div id="toast"></div>

<script>
/* ===================== 저장소 ===================== */
const LS = {
  holdings:'imm_holdings', cashflows:'imm_cashflows',
  stockMaster:'imm_stock_master', accountMaster:'imm_account_master',
  targets:'imm_targets', lastImport:'imm_last_import',
  members:'imm_members', importHistory:'imm_import_history',
  refMajor:'imm_ref_major', refMid:'imm_ref_mid', refCountry:'imm_ref_country',
  refBroker:'imm_ref_broker', refAcctType:'imm_ref_accttype'
};
function load(key){ try{ return JSON.parse(localStorage.getItem(key)) || []; }catch(e){ return []; } }
function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
function loadHoldings(){ return load(LS.holdings); }
function loadCashflows(){ return load(LS.cashflows); }
function loadStockMaster(){ return load(LS.stockMaster); }
function loadAccountMaster(){ return load(LS.accountMaster); }
function loadTargets(){
  const t = localStorage.getItem(LS.targets);
  return t ? JSON.parse(t) : {"배당":35,"성장":30,"지수":25,"현금성":10};
}
function saveTargets(obj){ save(LS.targets, obj); }
function loadMembers(){ return load(LS.members); }
function saveMembers(list){ save(LS.members, list); }
function allMembers(){
  const set = new Set(loadMembers());
  loadAccountMaster().forEach(a=>{ if(a.구성원) set.add(a.구성원); });
  return Array.from(set).sort();
}
function loadImportHistory(){ return load(LS.importHistory); }
function pushImportHistory(entry){
  const h = loadImportHistory();
  h.unshift(entry);
  save(LS.importHistory, h.slice(0,20));
}

/* ---- 관리항목 CRUD ---- */
function upsertMember(name){
  if(!name || !name.trim()) return;
  const list = loadMembers();
  if(!list.includes(name.trim())) { list.push(name.trim()); saveMembers(list); }
}
function removeMember(name){
  if(loadAccountMaster().some(a=>a.구성원===name)){
    alert(`⚠ '${name}' 구성원은 계좌 관리에 등록된 계좌가 있어 삭제할 수 없습니다.\n해당 계좌를 먼저 삭제하거나 다른 구성원으로 변경해주세요.`);
    return false;
  }
  saveMembers(loadMembers().filter(x=>x!==name));
  return true;
}
function upsertAccount(acc){
  const list = loadAccountMaster();
  const idx = list.findIndex(a=>a.계좌코드===acc.계좌코드);
  if(idx>=0) list[idx] = acc; else list.push(acc);
  save(LS.accountMaster, list);
}
function removeAccount(code){
  if(loadHoldings().some(h=>h.계좌코드===code) || loadCashflows().some(c=>c.계좌코드===code)){
    alert(`⚠ 계좌코드 '${code}'는 보유현황 또는 입출금 raw data에 기존 자료가 있어 삭제할 수 없습니다.\n먼저 해당 계좌의 raw data를 정리한 후 삭제해주세요.`);
    return false;
  }
  save(LS.accountMaster, loadAccountMaster().filter(a=>a.계좌코드!==code));
  return true;
}
function upsertStock(s){
  const list = loadStockMaster();
  const idx = list.findIndex(x=>x.종목코드===s.종목코드);
  if(idx>=0) list[idx] = s; else list.push(s);
  save(LS.stockMaster, list);
}
function removeStock(code){
  if(loadHoldings().some(h=>h.종목코드===code)){
    alert(`⚠ 종목코드 '${code}'는 보유현황 raw data에 기존 자료가 있어 삭제할 수 없습니다.\n먼저 해당 종목의 raw data를 정리한 후 삭제해주세요.`);
    return false;
  }
  save(LS.stockMaster, loadStockMaster().filter(s=>s.종목코드!==code));
  return true;
}

/* ---- 기준정보(마스터 코드값) CRUD ---- */
function loadRefList(key){ return load(key); }
function saveRefList(key, list){ save(key, list); }
function upsertRefItem(key, val){
  if(!val || !val.trim()) return;
  const list = loadRefList(key);
  if(!list.includes(val.trim())){ list.push(val.trim()); saveRefList(key, list); }
}
function removeRefItem(key, val){
  saveRefList(key, loadRefList(key).filter(x=>x!==val));
  return true;
}
function refItemInUse(field, val, masterLoader){
  return masterLoader().some(r=>r[field]===val);
}
function allRefValues(explicitKey, masterLoader, field){
  const set = new Set(loadRefList(explicitKey));
  masterLoader().forEach(r=>{ if(r[field]) set.add(r[field]); });
  return Array.from(set).sort();
}
function allBrokers(){ return allRefValues(LS.refBroker, loadAccountMaster, '증권사'); }
function allAcctTypes(){ return allRefValues(LS.refAcctType, loadAccountMaster, '계좌종류'); }
function allMajorCats(){ return allRefValues(LS.refMajor, loadStockMaster, '대분류'); }
function allMidCats(){ return allRefValues(LS.refMid, loadStockMaster, '중분류'); }
function allCountries(){ return allRefValues(LS.refCountry, loadStockMaster, '국가'); }
function upsertRefBroker(v){ upsertRefItem(LS.refBroker, v); }
function removeRefBroker(v){
  if(refItemInUse('증권사', v, loadAccountMaster)){
    alert(`⚠ '${v}' 증권사는 등록된 계좌에서 사용 중이어서 삭제할 수 없습니다.`);
    return false;
  }
  return removeRefItem(LS.refBroker, v);
}
function upsertRefAcctType(v){ upsertRefItem(LS.refAcctType, v); }
function removeRefAcctType(v){
  if(refItemInUse('계좌종류', v, loadAccountMaster)){
    alert(`⚠ '${v}' 계좌종류는 등록된 계좌에서 사용 중이어서 삭제할 수 없습니다.`);
    return false;
  }
  return removeRefItem(LS.refAcctType, v);
}
function upsertRefMajor(v){ upsertRefItem(LS.refMajor, v); }
function removeRefMajor(v){
  if(refItemInUse('대분류', v, loadStockMaster)){
    alert(`⚠ '${v}' 대분류는 등록된 종목에서 사용 중이어서 삭제할 수 없습니다.`);
    return false;
  }
  return removeRefItem(LS.refMajor, v);
}
function upsertRefMid(v){ upsertRefItem(LS.refMid, v); }
function removeRefMid(v){
  if(refItemInUse('중분류', v, loadStockMaster)){
    alert(`⚠ '${v}' 중분류는 등록된 종목에서 사용 중이어서 삭제할 수 없습니다.`);
    return false;
  }
  return removeRefItem(LS.refMid, v);
}
function upsertRefCountry(v){ upsertRefItem(LS.refCountry, v); }
function removeRefCountry(v){
  if(refItemInUse('국가', v, loadStockMaster)){
    alert(`⚠ '${v}' 국가는 등록된 종목에서 사용 중이어서 삭제할 수 없습니다.`);
    return false;
  }
  return removeRefItem(LS.refCountry, v);
}

/* ===================== 공통 유틸 ===================== */
function pad2(n){ return String(n).padStart(2,'0'); }
function toISODate(v){
  if(v==null) return null;
  if(v instanceof Date) return `${v.getFullYear()}-${pad2(v.getMonth()+1)}-${pad2(v.getDate())}`;
  if(typeof v === 'number'){ const d = XLSX.SSF.parse_date_code(v); return d ? `${d.y}-${pad2(d.m)}-${pad2(d.d)}` : null; }
  if(typeof v === 'string'){ const m = v.trim(); return m.length>=10 ? m.slice(0,10) : m; }
  return null;
}
function num(v){ const n = Number(v); return isNaN(n) ? 0 : n; }
function won(n){ if(n==null) return '-'; return Math.round(n).toLocaleString('ko-KR') + '원'; }
function formatThousands(v){
  if(v===null || v===undefined || v==='') return '';
  const parts = String(v).split('.');
  parts[0] = parts[0].replace(/[^0-9]/g,'');
  if(parts[0]==='') return parts.length>1 ? '' : '';
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  if(parts.length>1){ return parts[0] + '.' + parts[1].replace(/[^0-9]/g,''); }
  return parts[0];
}
function parseThousands(v){
  if(v===null || v===undefined) return '';
  return String(v).replace(/,/g, '');
}
function pct(n){ if(n==null) return '-'; return (n>0?'+':'') + (n*100).toFixed(1) + '%'; }
// 월(月) 단위 날짜 유틸: 모든 기준일자/날짜는 "해당 월의 마지막 날"로 저장한다.
// (일(日) 단위 오차나 JS Date 객체의 31일 초과 롤오버 버그를 피하기 위해 연/월 정수 연산만 사용)
function monthEndDate(yyyymm){
  const [y,m] = yyyymm.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  return `${y}-${pad2(m)}-${pad2(lastDay)}`;
}
function addMonths(iso, n){
  const [y,m] = iso.split('-').map(Number);
  const total = y*12 + (m-1) - n;
  const ny = Math.floor(total/12);
  const nm = total - ny*12 + 1;
  return monthEndDate(`${ny}-${pad2(nm)}`);
}
function todayISO(){ const d = new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
// "26년1월" 같은 축약형 연월 표기 <-> ISO 월말일자 상호 변환 (엑셀 불러오기/다운로드 공통 형식)
function parseShortMonth(v){
  if(v==null) return null;
  const s = String(v).trim();
  const m = s.match(/^(\d{2,4})\s*년\s*(\d{1,2})\s*월$/);
  if(!m) return toISODate(v); // 예전 형식(YYYY-MM-DD 등)이 섞여 들어와도 최대한 인식
  let y = Number(m[1]);
  if(y < 100) y += 2000;
  const mo = Number(m[2]);
  return monthEndDate(`${y}-${pad2(mo)}`);
}
function formatShortMonth(iso){
  if(!iso) return '';
  const [y,m] = iso.split('-').map(Number);
  return `${String(y).slice(2)}년${m}월`;
}
function toast(msg, duration){
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ el.style.display='none'; }, duration || 3500);
}

/* ===================== 엑셀 불러오기 ===================== */
// 엑셀 헤더 셀에 눈에 안 보이는 앞뒤 공백이 섞여 있거나("금액 " 등), 유니코드 정규화 형태(NFC/NFD)가
// 달라서 화면엔 "입출금"처럼 완전히 같아 보여도 코드의 문자열 리터럴과 키 비교(===)가 실패해
// 해당 컬럼이 통째로 인식되지 않는 경우가 있다. 모든 행의 키를 트림 + NFC로 통일해 이 문제를 막는다.
function sheetRows(wb, name){
  const ws = wb.Sheets[name];
  if(!ws) return [];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:null, raw:true});
  return rows.map(r=>{
    const out = {};
    Object.keys(r).forEach(k=>{
      let nk = k;
      if(typeof nk === 'string'){
        nk = nk.trim();
        if(nk.normalize) nk = nk.normalize('NFC');
      }
      out[nk] = r[k];
    });
    return out;
  });
}

async function handleFile(file){
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {cellDates:true});

    // 보유현황 시트 하나에 종목/계좌 정보가 함께 들어있는 2시트(보유현황·입출금) 양식.
    // 계좌명이 곧 계좌를 구분하는 고유 값으로 쓰인다(별도 계좌코드 없음).
    const holdSheetAll = sheetRows(wb, '보유현황');
    const cfSheetAll = sheetRows(wb, '입출금');
    const holdRaw = holdSheetAll.filter(r=>r['기준일자'] && r['계좌명'] && r['종목코드']);
    const cfRaw = cfSheetAll.filter(r=>r['날짜'] && r['계좌명'] && r['입출금'] && r['금액']!=null);
    // 진단용: 시트에서 읽은 원본 행수 대비 실제로 인정된 행수를 남겨, 형식이 안 맞아 걸러진 행이 있는지 알 수 있게 한다.
    console.log('[불러오기 진단] 보유현황 원본', holdSheetAll.length, '건 -> 인정', holdRaw.length, '건 / 입출금 원본', cfSheetAll.length, '건 -> 인정', cfRaw.length, '건');

    const holdings = holdRaw.map(r=>({
      기준일자: parseShortMonth(r['기준일자']), 계좌코드:String(r['계좌명']).trim(),
      종목코드:String(r['종목코드']).trim(), 수량:num(r['수량']), 매입평균단가:num(r['매입평균단가']),
      종가:num(r['종가(1주)']), 배당금:num(r['배당금']), 메모:r['메모']||''
    }));
    const cashflows = cfRaw.map(r=>({
      날짜: parseShortMonth(r['날짜']), 계좌코드:String(r['계좌명']).trim(),
      구분:String(r['입출금']).trim(), 금액:num(r['금액']), 메모:r['메모']||''
    }));
    // 보유현황 행에 함께 적힌 종목/계좌 정보로 기준정보를 자동 추출한다(동일 코드가 여러 번 나오면 마지막 값 사용).
    const stockMap0 = new Map();
    const acctMap0 = new Map();
    holdRaw.forEach(r=>{
      const 종목코드 = String(r['종목코드']).trim();
      stockMap0.set(종목코드, { 종목코드, 종목명:r['종목명']||'', 대분류:r['대분류']||'미분류', 중분류:r['중분류']||'', 국가:r['국가']||'' });
      const 계좌명 = String(r['계좌명']).trim();
      acctMap0.set(계좌명, { 계좌코드:계좌명, 구성원:r['구성원']||'', 증권사:r['증권사']||'', 계좌종류:r['계좌종류']||'', 계좌명 });
    });
    const stockMaster = Array.from(stockMap0.values());
    const accountMaster = Array.from(acctMap0.values());

    const holdKey = h => h.기준일자+'|'+h.계좌코드+'|'+h.종목코드;
    const cfKey = c => c.날짜+'|'+c.계좌코드+'|'+c.구분+'|'+c.금액+'|'+c.메모;

    const existHold = loadHoldings();
    const holdMap = new Map(existHold.map(h=>[holdKey(h), h]));
    let holdAdded=0, holdUpdated=0;
    holdings.forEach(h=>{
      const k = holdKey(h);
      if(holdMap.has(k)) holdUpdated++; else holdAdded++;
      holdMap.set(k, h);
    });
    save(LS.holdings, Array.from(holdMap.values()));

    const existCf = loadCashflows();
    const cfMap = new Map(existCf.map(c=>[cfKey(c), c]));
    let cfAdded=0;
    cashflows.forEach(c=>{
      const k = cfKey(c);
      if(!cfMap.has(k)) cfAdded++;
      cfMap.set(k, c);
    });
    save(LS.cashflows, Array.from(cfMap.values()));

    // 보유현황에서 추출한 종목/계좌 기준정보도 전체 교체가 아니라 기존 목록과 병합(upsert)한다.
    // 새 파일에 빠진 기존 계좌·종목은 삭제되지 않고 그대로 유지된다.
    const existStock = loadStockMaster();
    const stockMap = new Map(existStock.map(s=>[s.종목코드, s]));
    let stockAdded=0, stockUpdated=0;
    stockMaster.forEach(s=>{
      if(stockMap.has(s.종목코드)) stockUpdated++; else stockAdded++;
      stockMap.set(s.종목코드, s);
    });
    if(stockMaster.length) save(LS.stockMaster, Array.from(stockMap.values()));

    const existAcct = loadAccountMaster();
    const acctMap = new Map(existAcct.map(a=>[a.계좌코드, a]));
    let acctAdded=0, acctUpdated=0;
    accountMaster.forEach(a=>{
      if(acctMap.has(a.계좌코드)) acctUpdated++; else acctAdded++;
      acctMap.set(a.계좌코드, a);
    });
    if(accountMaster.length) save(LS.accountMaster, Array.from(acctMap.values()));

    // 진단용: 저장 직후 실제로 localStorage에 몇 건이 남았는지 재확인(저장 실패를 곧바로 알 수 있게).
    const savedCfCount = loadCashflows().length;
    const savedHoldCount = loadHoldings().length;

    const now = new Date();
    localStorage.setItem(LS.lastImport, now.toISOString());
    pushImportHistory({
      time: now.toISOString(), fileName: file.name,
      holdAdded, holdUpdated, cfAdded, stockAdded, stockUpdated, acctAdded, acctUpdated,
      holdSheetTotal: holdSheetAll.length, holdRecognized: holdRaw.length, savedHoldCount,
      cfSheetTotal: cfSheetAll.length, cfRecognized: cfRaw.length, savedCfCount
    });

    let msg = `불러오기 완료 · 보유현황 신규 ${holdAdded}건/갱신 ${holdUpdated}건(시트 ${holdSheetAll.length}행 중 ${holdRaw.length}행 인정, 저장후 총 ${savedHoldCount}건) · 입출금 신규 ${cfAdded}건(시트 ${cfSheetAll.length}행 중 ${cfRaw.length}행 인정, 저장후 총 ${savedCfCount}건) · 계좌 신규 ${acctAdded}건/갱신 ${acctUpdated}건 · 종목 신규 ${stockAdded}건/갱신 ${stockUpdated}건`;
    if(cfSheetAll.length > 0 && cfRaw.length === 0){
      // 어떤 열 이름이 실제로 인식됐는지 첫 행 기준으로 보여줘, 헤더 이름이 어긋난 경우 바로 알 수 있게 한다.
      const detectedKeys = Object.keys(cfSheetAll[0]||{}).join(', ');
      msg = `⚠ 입출금 시트에 ${cfSheetAll.length}행이 있지만 0건만 인정됐습니다. 첫 행에서 읽힌 열 이름: [${detectedKeys}] (필요한 열: 날짜, 계좌명, 입출금, 금액) · ` + msg;
    }
    toast(msg, 12000);
    renderAll();
  }catch(err){
    console.error(err);
    toast('불러오기 실패: '+(err && err.message ? err.message : '파일 형식을 확인해주세요.'), 8000);
  }
}

/* ===================== 계산 로직 ===================== */
// dateISO가 속한 "그 달"에 정확히 입력된 데이터만 사용한다. 이전 달 데이터를 이어받지 않으며,
// 해당 월에 데이터가 없는 계좌·종목은 이 스냅샷에 포함되지 않아 자연히 0으로 계산된다.
function snapshotAt(dateISO, acctCodeSet){
  const targetMonth = monthKey(dateISO);
  const all = loadHoldings();
  const byKey = new Map();
  for(const r of all){
    if(!r.기준일자 || monthKey(r.기준일자) !== targetMonth) continue;
    if(acctCodeSet && !acctCodeSet.has(r.계좌코드)) continue;
    const key = r.계좌코드+'|'+r.종목코드;
    const cur = byKey.get(key);
    if(!cur || r.기준일자 >= cur.기준일자) byKey.set(key, r);
  }
  return Array.from(byKey.values()).filter(r=>r.수량 > 0);
}
function valueOf(h){ return h.수량 * h.종가; }
function sum(arr){ return arr.reduce((a,b)=>a+b, 0); }

function getAccountsForMember(member){
  const accts = loadAccountMaster();
  return member==='전체' ? accts : accts.filter(a=>a.구성원===member);
}
function latestDate(acctCodeSet){
  const all = loadHoldings().filter(r=> !acctCodeSet || acctCodeSet.has(r.계좌코드));
  if(!all.length) return null;
  return all.reduce((mx,r)=> r.기준일자>mx? r.기준일자:mx, all[0].기준일자);
}
// raw 보유현황 데이터 중 가장 이른(최초 입력된) 기준일자. '전체' 기간 조회의 시작월로 사용한다.
function earliestDate(acctCodeSet){
  const all = loadHoldings().filter(r=> !acctCodeSet || acctCodeSet.has(r.계좌코드));
  if(!all.length) return null;
  return all.reduce((mn,r)=> r.기준일자<mn? r.기준일자:mn, all[0].기준일자);
}

function computeStats(acctCodeSet, startISO, endISO){
  const endSnap = snapshotAt(endISO, acctCodeSet);
  const startSnap = snapshotAt(startISO, acctCodeSet);
  const endValue = sum(endSnap.map(valueOf));
  const startValue = sum(startSnap.map(valueOf));
  const cfs = loadCashflows().filter(c=> (!acctCodeSet || acctCodeSet.has(c.계좌코드)) && c.날짜 > startISO && c.날짜 <= endISO);
  const netFlow = sum(cfs.map(c=> c.구분==='입금' ? c.금액 : -c.금액));
  const principal = startValue + netFlow;
  const ret = principal !== 0 ? (endValue - principal) / principal : null;
  const divs = sum(loadHoldings().filter(h=> (!acctCodeSet || acctCodeSet.has(h.계좌코드)) && h.기준일자 > startISO && h.기준일자 <= endISO).map(h=>h.배당금));
  const divYield = endValue !== 0 ? divs / endValue : null;
  return {endSnap, endValue, principal, ret, divs, divYield};
}

function monthKey(iso){ return iso.slice(0,7); }
// acctCodeSet의 raw data(보유현황/입출금) 중 가장 이른 날짜. '전체' 기간(startISO='1900-01-01')처럼
// 실제 데이터보다 훨씬 이전인 시작일을 사용할 때, 월별 반복이 불필요하게 과거로 거슬러 올라가지 않도록 잘라내는 용도.
function earliestActivityDate(acctCodeSet){
  const holds = loadHoldings().filter(r=> !acctCodeSet || acctCodeSet.has(r.계좌코드));
  const cfs = loadCashflows().filter(c=> !acctCodeSet || acctCodeSet.has(c.계좌코드));
  const dates = [...holds.map(h=>h.기준일자), ...cfs.map(c=>c.날짜)].filter(Boolean);
  if(!dates.length) return null;
  return dates.reduce((mn,d)=> d<mn?d:mn, dates[0]);
}
// startISO~endISO 사이의 "모든 달"에 대해 원금/자산/수익률을 계산한다.
// 특정 달에 raw data(보유현황)가 없어도 건너뛰지 않고, 원금은 그 달까지의 입출금을 계속 누적하여 계산한다
// (해당 달의 자산은 snapshotAt의 "정확히 그 달 일치, 없으면 0" 규칙에 따라 0으로 표시된다).
function accountMonthlySeries(acctCodeSet, startISO, endISO){
  const earliest = earliestActivityDate(acctCodeSet);
  let loopStart = startISO;
  if(earliest){
    const earliestMonthEnd = monthEndDate(monthKey(earliest));
    if(earliestMonthEnd > loopStart) loopStart = earliestMonthEnd;
  }
  if(!earliest || loopStart > endISO) return [];
  const dates = [loopStart];
  let cur = loopStart;
  let guard = 0;
  while(cur < endISO && guard < 1200){
    cur = addMonths(cur, -1);
    dates.push(cur);
    guard++;
  }
  return dates.map(d=>{
    const s = computeStats(acctCodeSet, startISO, d);
    return { label: monthKey(d), date:d, principal:s.principal, asset:s.endValue, ret:s.ret };
  });
}
// startISO~endISO 사이의 매달에 대해 그 달의 배당금(기준일자가 정확히 그 달인 보유현황의 배당금 합계),
// 총액(그 달 말 평가금액), 총액 대비 배당율을 계산한다. accountMonthlySeries와 동일한 월 순회 로직을 쓴다.
function accountDividendSeries(acctCodeSet, startISO, endISO){
  const earliest = earliestActivityDate(acctCodeSet);
  let loopStart = startISO;
  if(earliest){
    const earliestMonthEnd = monthEndDate(monthKey(earliest));
    if(earliestMonthEnd > loopStart) loopStart = earliestMonthEnd;
  }
  if(!earliest || loopStart > endISO) return [];
  const dates = [loopStart];
  let cur = loopStart;
  let guard = 0;
  while(cur < endISO && guard < 1200){
    cur = addMonths(cur, -1);
    dates.push(cur);
    guard++;
  }
  return dates.map(d=>{
    const snap = snapshotAt(d, acctCodeSet);
    const asset = sum(snap.map(valueOf));
    const div = sum(snap.map(h=>h.배당금||0));
    const divYield = asset ? div/asset : null;
    return { label: monthKey(d), date:d, div, asset, divYield };
  });
}
// 특정 종목(code) 하나의 기간별 추이를 계산한다. 여러 계좌에 나뉘어 있으면 수량은 합산하고,
// 구매단가는 "구매금액 합계/수량 합계"의 가중평균(1주 기준)으로, 종가는 계좌 간 평균으로 계산한다
// (같은 종목·같은 시점이면 종가는 원래 계좌마다 동일해야 정상).
function stockDetailSeries(code, acctCodeSet, startISO, endISO){
  const earliest = earliestActivityDate(acctCodeSet);
  let loopStart = startISO;
  if(earliest){
    const earliestMonthEnd = monthEndDate(monthKey(earliest));
    if(earliestMonthEnd > loopStart) loopStart = earliestMonthEnd;
  }
  if(!earliest || loopStart > endISO) return [];
  const dates = [loopStart];
  let cur = loopStart;
  let guard = 0;
  while(cur < endISO && guard < 1200){
    cur = addMonths(cur, -1);
    dates.push(cur);
    guard++;
  }
  return dates.map(d=>{
    const snap = snapshotAt(d, acctCodeSet).filter(h=>h.종목코드===code);
    const qty = sum(snap.map(h=>h.수량||0));
    const purchaseAmt = sum(snap.map(h=>(h.수량||0)*(h.매입평균단가||0)));
    const avgPrice = qty ? purchaseAmt/qty : null;
    const closes = snap.map(h=>h.종가).filter(v=>v!=null);
    const close = closes.length ? sum(closes)/closes.length : null;
    return { label: monthKey(d), date:d, qty, avgPrice, close };
  });
}

function renderNav(){
  const nav = document.getElementById('nav');
  const brandHtml = `
    <div class="brand">
      <img src="${BRAND_LOGO_DATA_URI}" class="brand-symbol-img" alt="Coscope 로고">
      <div class="brand-sub">Coscope</div>
      <div class="brand-title">Lifepilot <span class="brand-title-accent">Portfolio</span></div>
    </div>`;
  nav.innerHTML = brandHtml + NAV.map(n=>
    `<div class="nav-item ${state.screen===n.id?'active':''}" onclick="setScreen('${n.id}')">
      <span>${n.icon}</span><span>${n.label}</span>
    </div>`
  ).join('');
}
function setScreen(id){ state.screen = id; renderAll(); }
function renderAll(){
  renderNav();
  const main = document.getElementById('main');
  if(state.screen === 'home'){ renderHome(); }
  else if(state.screen === 'settings'){ renderSettings(); }
  else if(state.screen === 'period'){ renderPeriod(); }
  else if(state.screen === 'account'){ renderAccount(); }
  else if(state.screen === 'stock'){ renderStock(); }
  else if(state.screen === 'member'){ renderMember(); }
  else if(state.screen === 'manual'){ renderManual(); }
  else{
    const found = NAV.find(n=>n.id===state.screen);
    main.innerHTML = `<div class="placeholder"><h2>${found.label}</h2><p>이 화면은 다음 단계에서 만들어집니다.</p></div>`;
  }
}

/* ===================== 홈 화면 ===================== */
function periodRange(acctCodeSet){
  const end = state.periodPreset==='직접' && state.customEnd ? state.customEnd : (latestDate(acctCodeSet) || todayISO());
  let start;
  if(state.periodPreset==='직접' && state.customStart){ start = state.customStart; }
  else if(state.periodPreset==='1개월'){ start = addMonths(end,1); }
  else if(state.periodPreset==='3개월'){ start = addMonths(end,3); }
  else if(state.periodPreset==='1년'){ start = addMonths(end,12); }
  else { start = earliestDate(acctCodeSet) || '1900-01-01'; }
  return {start, end};
}

function renderHome(){
  const main = document.getElementById('main');
  const accts = loadAccountMaster();
  const members = ['전체', ...allMembers()];
  const acctCodeSet = new Set(getAccountsForMember(state.member).map(a=>a.계좌코드));
  // '전체' 구성원이어도 명시적으로 등록된 계좌 코드 집합으로 필터링한다(null로 필터를 끄면
  // 등록되지 않은/유실된 계좌코드의 raw data까지 섞여 다른 화면과 합계가 어긋날 수 있음).
  const filterSet = acctCodeSet;

  const {start, end} = periodRange(filterSet);
  const stats = computeStats(filterSet, start, end);
  // 조회 기간의 시작월/종료월에 정확히 일치하는 보유현황 데이터가 없으면(앞뒤 달을 이어받지 않는 설계상)
  // 원금·수익률이 실제보다 작게(또는 0으로) 나올 수 있어, 그 경우 안내 메시지를 띄운다.
  const startHasData = accts.length>0 && snapshotAt(start, filterSet).length>0;
  const endHasData = accts.length>0 && snapshotAt(end, filterSet).length>0;
  const stockMap = new Map(loadStockMaster().map(s=>[s.종목코드, s]));
  const acctMap = new Map(accts.map(a=>[a.계좌코드, a]));
  const targets = loadTargets();

  // 대분류 이름에 눈에 안 보이는 앞뒤 공백이나 유니코드 정규화(NFC/NFD) 차이가 섞여 있으면
  // 화면엔 "현금성"처럼 똑같아 보여도 문자열 비교(===)가 실패해 목표비중과 매칭이 안 될 수 있다.
  // (엑셀에서 가져온 대분류 값과 목표비중 설정 화면의 대분류 값이 서로 다른 경로로 들어오기 때문)
  // 비교 전에 항상 트림 + NFC로 정규화해서 이 문제를 막는다.
  const cleanCat = (v)=> (v==null ? '' : String(v)).trim().normalize('NFC');

  // 대분류 집계
  const catTotals = {};
  stats.endSnap.forEach(h=>{
    const s = stockMap.get(h.종목코드);
    const cat = s && s.대분류 ? cleanCat(s.대분류) : '미분류';
    catTotals[cat] = (catTotals[cat]||0) + valueOf(h);
  });
  const cleanTargets = {};
  Object.keys(targets).forEach(k=>{ cleanTargets[cleanCat(k)] = targets[k]; });
  // 관리항목에 등록된 대분류인데 목표비중 설정 화면에서 저장을 한 번도 하지 않은 항목은
  // targets 객체에 키 자체가 없다(0으로 저장된 게 아니라 아예 없음). 이런 항목도
  // "목표비중을 아직 안 정했을 뿐 암묵적으로는 0%"로 간주해서 (목표 0%)가 항상 표기되도록 한다.
  allMajorCats().forEach(c=>{
    const cc = cleanCat(c);
    if(!(cc in cleanTargets)) cleanTargets[cc] = 0;
  });
  // 목표비중이 설정된 대분류는 현재 보유 자산이 0이어도(예: 목표 0%) 목록에 나타나도록
  // 실제 보유 대분류와 목표비중이 설정된 대분류를 합쳐서 목록을 만든다.
  // 단, 목표비중도 0%이고 실제 보유 자산도 0인 대분류는 표시할 필요가 없으므로 제외한다.
  const catNames = Array.from(new Set([...Object.keys(catTotals), ...Object.keys(cleanTargets)]))
    .filter(cat=> (catTotals[cat]||0) !== 0 || (cleanTargets[cat]||0) !== 0);
  const catEntries = catNames.map(cat=>[cat, catTotals[cat]||0]).sort((a,b)=>b[1]-a[1]);
  const colors = ['#5DCAA5','#7F77DD','#F0997B','#B4B2A9','#378ADD','#D4537E'];

  // 계좌별 집계
  const acctTotals = {};
  stats.endSnap.forEach(h=>{ acctTotals[h.계좌코드] = (acctTotals[h.계좌코드]||0) + valueOf(h); });
  const acctRows = Object.entries(acctTotals).map(([code, val])=>{
    const a = acctMap.get(code) || {구성원:'', 증권사:'', 계좌명:code};
    const single = new Set([code]);
    const s = computeStats(single, start, end);
    return {code, val, ret:s.ret, meta:a};
  }).sort((a,b)=>b.val-a.val);

  const amtOrMask = (n)=> state.ratioOnly ? '<span class="muted">••••••</span>' : won(n);

  main.innerHTML = `
    <div class="row between" style="margin-bottom:10px;">
      <div class="row">
        <span>👤</span>
        <select onchange="state.member=this.value; renderHome();">
          ${members.map(m=>`<option value="${m}" ${state.member===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="row">
        <label class="chip" style="cursor:pointer;">
          📥 엑셀 불러오기
          <input type="file" accept=".xlsx" style="display:none;" onchange="handleFile(this.files[0])">
        </label>
        <button onclick="toggleRatioOnly(renderHome);">
          ${state.ratioOnly ? '👁 금액 표시' : '🙈 비율만 보기'}
        </button>
      </div>
    </div>

    <div class="row" style="margin-bottom:14px;">
      ${['1개월','3개월','1년','전체'].map(p=>`<span class="chip ${state.periodPreset===p?'active':''}" onclick="state.periodPreset='${p}'; renderHome();">${p}</span>`).join('')}
      <span class="chip ${state.periodPreset==='직접'?'active':''}" onclick="state.periodPreset='직접'; renderHome();">📅 기간 직접 선택</span>
      ${state.periodPreset==='직접' ? `
        <input type="month" value="${monthKey(state.customStart||start)}" onchange="state.customStart=monthEndDate(this.value); renderHome();">
        ~
        <input type="month" value="${monthKey(state.customEnd||end)}" onchange="state.customEnd=monthEndDate(this.value); renderHome();">
      ` : ''}
      ${state.periodPreset!=='직접' ? `<span class="muted">(${monthKey(start)} ~ ${monthKey(end)})</span>` : ''}
      <span class="muted" style="margin-left:auto;">기준일 ${monthKey(end)}</span>
    </div>

    ${!accts.length ? `<div class="warn-box">⚠ 불러온 데이터가 없습니다. 위의 "엑셀 불러오기" 버튼으로 입력 양식을 불러와주세요.</div>` : ''}
    ${accts.length && (!startHasData || !endHasData) ? `<div class="warn-box">⚠ 조회 기간의 ${!startHasData && !endHasData ? `시작월(${monthKey(start)})과 종료월(${monthKey(end)})` : !startHasData ? `시작월(${monthKey(start)})` : `종료월(${monthKey(end)})`}에 해당하는 보유현황 데이터가 없습니다. 원금·수익률이 정확하지 않을 수 있으니 데이터가 있는 기간으로 다시 조회해주세요.</div>` : ''}

    <div class="cards">
      <div class="card"><p class="label">${state.member} 자산총액</p><p class="value">${amtOrMask(stats.endValue)}</p></div>
      <div class="card"><p class="label">기간 수익률</p><p class="value ${stats.ret>0?'up':stats.ret<0?'down':''}">${pct(stats.ret)}</p></div>
      <div class="card"><p class="label">기간 배당금</p><p class="value">${amtOrMask(stats.divs)}</p></div>
      <div class="card"><p class="label">기간 배당율</p><p class="value ${stats.divYield>0?'up':''}">${pct(stats.divYield)}</p></div>
      <div class="card"><p class="label">순 투입원금</p><p class="value">${amtOrMask(stats.principal)}</p></div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h2>자산배분</h2>
        ${catEntries.length ? donutSVG(catEntries, colors) : '<p class="muted">데이터 없음</p>'}
        <div style="margin-top:10px;">
          ${catEntries.map(([cat,val],i)=>{
            const p = stats.endValue ? Math.round(val/stats.endValue*1000)/10 : 0;
            const t = cleanTargets[cat];
            const over = t!=null && p > t;
            return `<div class="legend-row" style="${over?'color:var(--danger);':''}">
              <span><span class="dot" style="background:${colors[i%colors.length]}"></span>${cat}</span>
              <span>${amtOrMask(val)} · ${p}%${t!=null?` (목표 ${t}%)`:''}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div class="panel">
        <h2>계좌별 현황</h2>
        ${acctRows.length ? acctRows.map(r=>`
          <div class="list-row">
            <p style="margin:0; font-weight:bold; font-size:14px;">${r.meta.계좌명}</p>
            <div style="text-align:right;">
              <p style="margin:0; font-weight:bold; font-size:14px;">${amtOrMask(r.val)}</p>
              <p style="margin:0; font-size:12px;" class="${r.ret>0?'value up':r.ret<0?'value down':'muted'}">${pct(r.ret)}</p>
            </div>
          </div>
        `).join('') : '<p class="muted">데이터 없음</p>'}
      </div>
    </div>
  `;
}

function donutSVG(entries, colors){
  const total = sum(entries.map(e=>e[1]));
  const r = 35;
  const C = 2 * Math.PI * r;
  let offset = 0;
  const circles = [];
  const labels = [];
  entries.forEach(([cat,val],i)=>{
    const frac = total ? val/total : 0;
    const len = frac * C;
    const dash = len + ' ' + (C - len);
    circles.push(`<circle cx="50" cy="50" r="${r}" fill="none" stroke="${colors[i%colors.length]}" stroke-width="16" stroke-dasharray="${dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 50 50)"/>`);
    // 너무 얇은 조각(6% 미만)에는 글자가 겹쳐 보여 라벨을 생략한다.
    if(frac >= 0.06){
      const midOffset = offset + len/2;
      const midAngleRad = (-90 + (midOffset/C)*360) * Math.PI/180;
      const lx = (50 + r*Math.cos(midAngleRad)).toFixed(1);
      const ly = (50 + r*Math.sin(midAngleRad)).toFixed(1);
      labels.push(`<text x="${lx}" y="${ly}" font-size="6.5" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#222" style="pointer-events:none;">${cat}</text>`);
    }
    offset += len;
  });
  // 가벼운 입체감(볼륨): 무거운 3D 렌더링 대신 순수 SVG로 (1) 살짝 아래로 어긋난 어두운 그림자 링을 깔아
  // 도넛의 두께처럼 보이게 하고, (2) 메인 링에 drop-shadow로 살짝 띄운 느낌을 주고, (3) 좌상단이 밝은
  // 반투명 그라디언트를 겹쳐 곡면에 빛이 비치는 듯한 광택을 더한다. 정적 도형 몇 개만 추가되는 정도라
  // 성능 부담은 거의 없다.
  return `<svg viewBox="0 0 100 100" style="width:100%; max-width:280px; display:block; margin:0 auto;">
    <defs>
      <radialGradient id="donutGloss" cx="35%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
        <stop offset="55%" stop-color="#fff" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <circle cx="50" cy="53" r="${r}" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="16"/>
    <g style="filter:drop-shadow(0 3px 3px rgba(0,0,0,0.22));">${circles.join('')}</g>
    <circle cx="50" cy="50" r="${r}" fill="none" stroke="url(#donutGloss)" stroke-width="16"/>
    ${labels.join('')}
  </svg>`;
}

/* ===================== 기간별 화면 ===================== */
function wonAxis(n){
  if(n===0) return '0';
  const abs = Math.abs(n);
  if(abs >= 100000000) return (n/100000000).toFixed(abs % 100000000 === 0 ? 0 : 1) + '억';
  if(abs >= 10000) return Math.round(n/10000).toLocaleString('ko-KR') + '만';
  return Math.round(n).toLocaleString('ko-KR');
}
// 그래프 y축의 최대값을 데이터의 실제 최대값이 아니라 "보기 좋은" 값으로 올림한다.
// 예: 데이터 최대값이 9.9억이면 축의 최대값은 10억이 되고, 1/4 간격 보조선은 2.5억·5억·7.5억·10억이 된다.
function niceAxisMax(rawMax){
  if(!rawMax || rawMax <= 0) return 1;
  const rawStep = rawMax / 4;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep / mag;
  let niceNorm;
  if(norm <= 1) niceNorm = 1;
  else if(norm <= 2) niceNorm = 2;
  else if(norm <= 2.5) niceNorm = 2.5;
  else if(norm <= 5) niceNorm = 5;
  else niceNorm = 10;
  return niceNorm * mag * 4;
}
function barLineChartSVG(series, ratioOnly){
  const W=680, H=300, padL=66, padR=50, padT=28, padB=36;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n = series.length;
  if(!n) return '<p class="muted">표시할 데이터가 없습니다.</p>';
  const maxVal = niceAxisMax(Math.max(1, ...series.map(s=>Math.max(s.principal||0, s.asset||0))));
  const maxRetAbs = niceAxisMax(Math.max(0.01, ...series.map(s=>Math.abs(s.ret||0))));
  const groupW = plotW / n;
  const barW = Math.min(22, groupW/2.6);
  const yVal = v => padT + plotH - (v/maxVal)*plotH;
  const yRet = r => padT + plotH/2 - (r/maxRetAbs)*(plotH/2);

  const COLOR_PRINCIPAL = '#B4B2A9';
  const COLOR_ASSET = '#378ADD';
  const COLOR_RET = '#D85A30';

  let bars = '', points = [], dots = '';
  series.forEach((s,i)=>{
    const gx = padL + i*groupW + groupW/2;
    const x1 = gx - barW - 2, x2 = gx + 2;
    const pv = s.principal||0, av = s.asset||0, rv = s.ret||0;
    const y1 = yVal(pv), y2 = yVal(av);
    bars += `<rect x="${x1}" y="${y1}" width="${barW}" height="${Math.max(0,(padT+plotH)-y1)}" fill="${COLOR_PRINCIPAL}"/>`;
    bars += `<rect x="${x2}" y="${y2}" width="${barW}" height="${Math.max(0,(padT+plotH)-y2)}" fill="${COLOR_ASSET}"/>`;
    points.push(`${gx},${yRet(rv)}`);
    dots += `<circle cx="${gx}" cy="${yRet(rv)}" r="3" fill="${COLOR_RET}"/>`;
  });
  const line = `<polyline points="${points.join(' ')}" fill="none" stroke="${COLOR_RET}" stroke-width="2"/>`;
  const xlabels = series.map((s,i)=>{
    const gx = padL + i*groupW + groupW/2;
    return `<text x="${gx}" y="${H-14}" font-size="10" text-anchor="middle" fill="#5F5E5A">${s.label.slice(2)}</text>`;
  }).join('');
  const zeroY = yRet(0);
  const zeroLine = `<line x1="${padL}" y1="${zeroY}" x2="${W-padR}" y2="${zeroY}" stroke="#D3D1C7" stroke-dasharray="3,3"/>`;

  // 좌측(금액) 축 눈금 + 격자선 (1/4 간격 4개)
  const valTicks = [maxVal*0.25, maxVal*0.5, maxVal*0.75, maxVal];
  const leftAxis = valTicks.map(v=>{
    const y = yVal(v);
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#EEEDE7"/>
      <line x1="${padL-4}" y1="${y}" x2="${padL}" y2="${y}" stroke="#888780"/>
      <text x="${padL-8}" y="${y+3}" font-size="10" text-anchor="end" fill="#5F5E5A">${ratioOnly ? '••••' : wonAxis(v)}</text>`;
  }).join('');

  // 우측(수익률) 축 눈금 (0을 중심으로 대칭, 1/4 간격 기준 4개 + 0)
  const retTicks = [-maxRetAbs, -maxRetAbs/2, 0, maxRetAbs/2, maxRetAbs];
  const rightAxis = retTicks.map(r=>{
    const y = yRet(r);
    return `<line x1="${W-padR}" y1="${y}" x2="${W-padR+4}" y2="${y}" stroke="#888780"/>
      <text x="${W-padR+8}" y="${y+3}" font-size="10" text-anchor="start" fill="${COLOR_RET}">${(r*100).toFixed(0)}%</text>`;
  }).join('');

  const axisLines = `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="#888780"/>
    <line x1="${W-padR}" y1="${padT}" x2="${W-padR}" y2="${padT+plotH}" stroke="#888780"/>`;

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto;">
    ${leftAxis}
    ${axisLines}
    ${zeroLine}
    ${bars}
    ${line}${dots}
    ${xlabels}
    ${rightAxis}
    <text x="${padL}" y="16" font-size="11" fill="${COLOR_PRINCIPAL}">■ 원금</text>
    <text x="${padL+48}" y="16" font-size="11" fill="${COLOR_ASSET}">■ 총액</text>
    <text x="${padL+96}" y="16" font-size="10" fill="#888780">(막대 · 왼쪽축 · 금액,원)</text>
    <text x="${W-padR}" y="16" font-size="11" text-anchor="end" fill="${COLOR_RET}">● 수익률 (선 · 오른쪽축 · %)</text>
  </svg>`;
}

// 배당금·총액은 막대(왼쪽 금액축), 배당율(총액 기준 = 배당금/총액)은 꺾은선(오른쪽 % 축)으로 그린다.
// 배당율은 수익률과 달리 보통 음수가 없으므로 0을 축 바닥에 두는 방식으로 그린다(수익률 차트처럼 0을 중앙에 두지 않음).
function dividendChartSVG(series, ratioOnly){
  const W=680, H=300, padL=66, padR=50, padT=28, padB=36;
  const plotW=W-padL-padR, plotH=H-padT-padB;

  const maxVal = niceAxisMax(Math.max(1, ...series.map(s=>Math.max(s.div||0, s.asset||0))));
  const maxYieldAbs = niceAxisMax(Math.max(0.001, ...series.map(s=>Math.abs(s.divYield||0))));
  const groupW = plotW / n;
  const barW = Math.min(22, groupW/2.6);
  const yVal = v => padT + plotH - (v/maxVal)*plotH;
  const yYield = r => padT + plotH - (r/maxYieldAbs)*plotH;

  const COLOR_DIV = '#E8A33D';
  const COLOR_ASSET = '#378ADD';
  const COLOR_YIELD = '#2E8B57';

  let bars = '', points = [], dots = '';
  series.forEach((s,i)=>{
    const gx = padL + i*groupW + groupW/2;
    const x1 = gx - barW - 2, x2 = gx + 2;
    const dv = s.div||0, av = s.asset||0, yv = s.divYield||0;
    const y1 = yVal(dv), y2 = yVal(av);
    bars += `<rect x="${x1}" y="${y1}" width="${barW}" height="${Math.max(0,(padT+plotH)-y1)}" fill="${COLOR_DIV}"/>`;
    bars += `<rect x="${x2}" y="${y2}" width="${barW}" height="${Math.max(0,(padT+plotH)-y2)}" fill="${COLOR_ASSET}"/>`;
    points.push(`${gx},${yYield(yv)}`);
    dots += `<circle cx="${gx}" cy="${yYield(yv)}" r="3" fill="${COLOR_YIELD}"/>`;
  });
  const line = `<polyline points="${points.join(' ')}" fill="none" stroke="${COLOR_YIELD}" stroke-width="2"/>`;
  const xlabels = series.map((s,i)=>{
    const gx = padL + i*groupW + groupW/2;
    return `<text x="${gx}" y="${H-14}" font-size="10" text-anchor="middle" fill="#5F5E5A">${s.label.slice(2)}</text>`;
  }).join('');

  // 좌측(금액) 축 눈금 + 격자선 (1/4 간격 4개)
  const valTicks = [maxVal*0.25, maxVal*0.5, maxVal*0.75, maxVal];
  const leftAxis = valTicks.map(v=>{
    const y = yVal(v);
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#EEEDE7"/>
      <line x1="${padL-4}" y1="${y}" x2="${padL}" y2="${y}" stroke="#888780"/>
      <text x="${padL-8}" y="${y+3}" font-size="10" text-anchor="end" fill="#5F5E5A">${ratioOnly ? '••••' : wonAxis(v)}</text>`;
  }).join('');

  // 우측(배당율) 축 눈금 (1/4 간격 4개)
  const yieldTicks = [maxYieldAbs*0.25, maxYieldAbs*0.5, maxYieldAbs*0.75, maxYieldAbs];
  const rightAxis = yieldTicks.map(r=>{
    const y = yYield(r);
    return `<line x1="${W-padR}" y1="${y}" x2="${W-padR+4}" y2="${y}" stroke="#888780"/>
      <text x="${W-padR+8}" y="${y+3}" font-size="10" text-anchor="start" fill="${COLOR_YIELD}">${(r*100).toFixed(1)}%</text>`;
  }).join('');

  const axisLines = `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="#888780"/>
    <line x1="${W-padR}" y1="${padT}" x2="${W-padR}" y2="${padT+plotH}" stroke="#888780"/>`;

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto;">
    ${leftAxis}
    ${axisLines}
    ${bars}
    ${line}${dots}
    ${xlabels}
    ${rightAxis}
    <text x="${padL}" y="16" font-size="11" fill="${COLOR_DIV}">■ 배당금</text>
    <text x="${padL+48}" y="16" font-size="11" fill="${COLOR_ASSET}">■ 총액</text>
    <text x="${padL+96}" y="16" font-size="10" fill="#888780">(막대 · 왼쪽축 · 금액,원)</text>
    <text x="${W-padR}" y="16" font-size="11" text-anchor="end" fill="${COLOR_YIELD}">● 배당율 (선 · 오른쪽축 · %, 총액기준)</text>
  </svg>`;
}

// 개별 종목 하나의 기간별 추이: 수량은 막대(오른쪽 축), 구매단가·종가(둘 다 1주 기준 원화)는
// 꺾은선 두 개(왼쪽 축)로 그린다. 두 가격 라인이 같은 축을 쓰므로 서로 바로 비교해볼 수 있다.
function stockDetailChartSVG(series, ratioOnly){
  const W=680, H=300, padL=66, padR=66, padT=28, padB=36;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n = series.length;
  if(!n) return '<p class="muted">표시할 데이터가 없습니다.</p>';
  const maxQty = niceAxisMax(Math.max(1, ...series.map(s=>s.qty||0)));
  const maxPrice = niceAxisMax(Math.max(1, ...series.map(s=>Math.max(s.avgPrice||0, s.close||0))));
  const groupW = plotW / n;
  const barW = Math.min(26, groupW*0.5);
  const yQty = v => padT + plotH - (v/maxQty)*plotH;
  const yPrice = v => padT + plotH - (v/maxPrice)*plotH;

  const COLOR_QTY = '#B4B2A9';
  const COLOR_AVGPRICE = '#7F77DD';
  const COLOR_CLOSE = '#378ADD';

  let bars = '', avgPoints = [], closePoints = [], avgDots = '', closeDots = '';
  series.forEach((s,i)=>{
    const gx = padL + i*groupW + groupW/2;
    const qv = s.qty||0;
    const y1 = yQty(qv);
    bars += `<rect x="${gx-barW/2}" y="${y1}" width="${barW}" height="${Math.max(0,(padT+plotH)-y1)}" fill="${COLOR_QTY}"/>`;
    if(s.avgPrice!=null){ avgPoints.push(`${gx},${yPrice(s.avgPrice)}`); avgDots += `<circle cx="${gx}" cy="${yPrice(s.avgPrice)}" r="3" fill="${COLOR_AVGPRICE}"/>`; }
    if(s.close!=null){ closePoints.push(`${gx},${yPrice(s.close)}`); closeDots += `<circle cx="${gx}" cy="${yPrice(s.close)}" r="3" fill="${COLOR_CLOSE}"/>`; }
  });
  const avgLine = avgPoints.length ? `<polyline points="${avgPoints.join(' ')}" fill="none" stroke="${COLOR_AVGPRICE}" stroke-width="2"/>` : '';
  const closeLine = closePoints.length ? `<polyline points="${closePoints.join(' ')}" fill="none" stroke="${COLOR_CLOSE}" stroke-width="2"/>` : '';
  const xlabels = series.map((s,i)=>{
    const gx = padL + i*groupW + groupW/2;
    return `<text x="${gx}" y="${H-14}" font-size="10" text-anchor="middle" fill="#5F5E5A">${s.label.slice(2)}</text>`;
  }).join('');

  // 좌측(가격/주) 축 눈금 + 격자선 (1/4 간격 4개)
  const priceTicks = [maxPrice*0.25, maxPrice*0.5, maxPrice*0.75, maxPrice];
  const leftAxis = priceTicks.map(v=>{
    const y = yPrice(v);
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#EEEDE7"/>
      <line x1="${padL-4}" y1="${y}" x2="${padL}" y2="${y}" stroke="#888780"/>
      <text x="${padL-8}" y="${y+3}" font-size="10" text-anchor="end" fill="#5F5E5A">${ratioOnly ? '••••' : wonAxis(v)}</text>`;
  }).join('');

  // 우측(수량) 축 눈금 (1/4 간격 4개)
  const qtyTicks = [maxQty*0.25, maxQty*0.5, maxQty*0.75, maxQty];
  const rightAxis = qtyTicks.map(v=>{
    const y = yQty(v);
    return `<line x1="${W-padR}" y1="${y}" x2="${W-padR+4}" y2="${y}" stroke="#888780"/>
      <text x="${W-padR+8}" y="${y+3}" font-size="10" text-anchor="start" fill="${COLOR_QTY}">${ratioOnly ? '••••' : Math.round(v).toLocaleString('ko-KR')}</text>`;
  }).join('');

  const axisLines = `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="#888780"/>
    <line x1="${W-padR}" y1="${padT}" x2="${W-padR}" y2="${padT+plotH}" stroke="#888780"/>`;

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto;">
    ${leftAxis}
    ${axisLines}
    ${bars}
    ${avgLine}${avgDots}
    ${closeLine}${closeDots}
    ${xlabels}
    ${rightAxis}
    <text x="${padL}" y="16" font-size="11" fill="${COLOR_AVGPRICE}">● 구매단가(1주)</text>
    <text x="${padL+92}" y="16" font-size="11" fill="${COLOR_CLOSE}">● 종가(1주)</text>
    <text x="${padL+156}" y="16" font-size="10" fill="#888780">(선 · 왼쪽축 · 원/주)</text>
    <text x="${W-padR}" y="16" font-size="11" text-anchor="end" fill="${COLOR_QTY}">■ 수량 (막대 · 오른쪽축)</text>
  </svg>`;
}

function runPeriodQuery(){
  state.periodQueried = true;
  const acctCodeSet0 = new Set(getAccountsForMember(state.member).map(a=>a.계좌코드));
  // '전체' 구성원이어도 명시적으로 등록된 계좌 코드 집합으로 필터링(홈 화면과 동일한 기준으로 통일)

  document.getElementById('periodChartArea').innerHTML = renderPeriodResult(start, end, memberFilterSet, true);

function renderPeriodResult(start, end, memberFilterSet, forceQuery){
  if(!forceQuery && state.periodFilter.broker==='전체' && state.periodFilter.acctType==='전체' && state.periodFilter.acctName==='전체'){
    return '<p class="muted">조회 조건을 선택하고 "조회" 버튼을 눌러주세요. (전체로 두면 선택된 구성원의 모든 계좌 합계를 조회합니다)</p>';
  }
  const accts = getAccountsForMember(state.member).filter(a=>
    (state.periodFilter.broker==='전체' || a.증권사===state.periodFilter.broker) &&
    (state.periodFilter.acctType==='전체' || a.계좌종류===state.periodFilter.acctType) &&
    (state.periodFilter.acctName==='전체' || a.계좌명===state.periodFilter.acctName)
  );
  const codeSet = new Set(accts.map(a=>a.계좌코드));
  if(!codeSet.size) return '<p class="muted">조건에 맞는 계좌가 없습니다.</p>';
  if(state.periodViewMode==='dividend'){
    const dseries = accountDividendSeries(codeSet, start, end);
    if(!dseries.length) return '<p class="muted">해당 기간에 월별 데이터가 없습니다.</p>';
    return `<div class="panel">${dividendChartSVG(dseries, state.ratioOnly)}</div>`;
  }
  const series = accountMonthlySeries(codeSet, start, end);
  if(!series.length) return '<p class="muted">해당 기간에 월별 데이터가 없습니다.</p>';
  return `<div class="panel">${barLineChartSVG(series, state.ratioOnly)}</div>`;
}

/* ===================== 계좌 화면 ===================== */
function regionOf(country){
  if(country==='한국') return '한국';
  if(country==='미국') return '미국';
  return '기타';
}
function computeAccountRow(codeSet, start, end, majorCats){
  const s = computeStats(codeSet, start, end);
  const stockMap = new Map(loadStockMaster().map(x=>[x.종목코드, x]));
  const catTotals = {};
  const regionTotals = {'한국':0, '미국':0, '기타':0};
  s.endSnap.forEach(h=>{
    const st = stockMap.get(h.종목코드);
    const cat = st && st.대분류 ? st.대분류 : '미분류';
    const val = valueOf(h);
    catTotals[cat] = (catTotals[cat]||0) + val;
    const region = regionOf(st ? st.국가 : '');
    regionTotals[region] = (regionTotals[region]||0) + val;
  });
  const catWeights = {};
  majorCats.forEach(c=>{ catWeights[c] = s.endValue ? (catTotals[c]||0)/s.endValue : 0; });
  const regionWeights = {};
  ['한국','미국','기타'].forEach(r=>{ regionWeights[r] = s.endValue ? (regionTotals[r]||0)/s.endValue : 0; });
  return { principal:s.principal, asset:s.endValue, ret:s.ret, catWeights, regionWeights };
}
function accountTypeRows(accts, start, end, majorCats){
  const types = Array.from(new Set(accts.map(a=>a.계좌종류))).filter(Boolean).sort();
  return types.map(t=>{
    const codeSet = new Set(accts.filter(a=>a.계좌종류===t).map(a=>a.계좌코드));
    return { label:t, ...computeAccountRow(codeSet, start, end, majorCats) };
  });
}
function accountNameRows(accts, acctType, start, end, majorCats){
  return accts.filter(a=>a.계좌종류===acctType).map(a=>{
    const codeSet = new Set([a.계좌코드]);
    return { label:a.계좌명, ...computeAccountRow(codeSet, start, end, majorCats) };
  });
}
function activeMajorCats(){
  const stockMap = new Map(loadStockMaster().map(s=>[s.종목코드, s]));
  const set = new Set(allMajorCats());
  loadHoldings().forEach(h=>{
    const st = stockMap.get(h.종목코드);
    set.add(st && st.대분류 ? st.대분류 : '미분류');
  });
  return Array.from(set).sort((a,b)=> (a==='미분류')-(b==='미분류') || a.localeCompare(b,'ko'));
}
// 선택된 대분류 안에 실제로 존재하는 중분류 목록(기준정보 + raw data 모두 반영)
function activeMidCatsFor(major){
  const set = new Set();
  loadStockMaster().forEach(s=>{ if((s.대분류 ? s.대분류 : '미분류')===major && s.중분류) set.add(s.중분류); });
  const stockMap = new Map(loadStockMaster().map(s=>[s.종목코드, s]));
  loadHoldings().forEach(h=>{
    const st = stockMap.get(h.종목코드);
    const cat = st && st.대분류 ? st.대분류 : '미분류';
    if(cat===major) set.add(st && st.중분류 ? st.중분류 : '미분류');
  });
  return Array.from(set).sort((a,b)=> (a==='미분류')-(b==='미분류') || a.localeCompare(b,'ko'));
}
// 선택된 대분류로 필터링된 자산금액 + 그 안에서의 중분류별/지역별 비중(합계 100%)
function computeAccountRowForMajor(codeSet, start, end, major, midCats){
  const s = computeStats(codeSet, start, end);
  const stockMap = new Map(loadStockMaster().map(x=>[x.종목코드, x]));
  const midTotals = {};
  const regionTotals = {'한국':0, '미국':0, '기타':0};
  let majorTotal = 0;
  s.endSnap.forEach(h=>{
    const st = stockMap.get(h.종목코드);
    const cat = st && st.대분류 ? st.대분류 : '미분류';
    if(cat!==major) return;
    const val = valueOf(h);
    majorTotal += val;
    const mid = st && st.중분류 ? st.중분류 : '미분류';
    midTotals[mid] = (midTotals[mid]||0) + val;
    const region = regionOf(st ? st.국가 : '');
    regionTotals[region] = (regionTotals[region]||0) + val;
  });
  const midWeights = {};
  midCats.forEach(m=>{ midWeights[m] = majorTotal ? (midTotals[m]||0)/majorTotal : 0; });
  const regionWeights = {};
  ['한국','미국','기타'].forEach(r=>{ regionWeights[r] = majorTotal ? (regionTotals[r]||0)/majorTotal : 0; });
  return { asset: majorTotal, midWeights, regionWeights };
}
function accountTypeRowsForMajor(accts, start, end, major, midCats){
  const types = Array.from(new Set(accts.map(a=>a.계좌종류))).filter(Boolean).sort();
  return types.map(t=>{
    const codeSet = new Set(accts.filter(a=>a.계좌종류===t).map(a=>a.계좌코드));
    return { label:t, ...computeAccountRowForMajor(codeSet, start, end, major, midCats) };
  });
}
function accountNameRowsForMajor(accts, acctType, start, end, major, midCats){
  return accts.filter(a=>a.계좌종류===acctType).map(a=>{
    const codeSet = new Set([a.계좌코드]);
    return { label:a.계좌명, ...computeAccountRowForMajor(codeSet, start, end, major, midCats) };
  });
}

// 대분류 드릴다운 전용 매트릭스: 중분류별/지역별 비중이 선택된 대분류 내에서 합계 100%가 되도록 계산됨
function accountMatrixTableDrill(rows, midCats, major, amtOrMask, onRowClickFnName, missingAcctNames, missingAcctTypes){
  missingAcctNames = missingAcctNames || new Set();
  missingAcctTypes = missingAcctTypes || new Set();
  const regions = ['한국','미국','기타'];
  const colCount = 2 + midCats.length + regions.length;
  const renderDataRow = (r, isChild)=>{
    const clickable = onRowClickFnName && !isChild && r.label!=='전체';
    const expanded = clickable && state.accountExpanded.has(r.label);
    const arrow = clickable ? (expanded ? ' ▾' : ' ▸') : '';
    // 조회 기간(시작월/종료월)에 데이터가 없는 계좌는 빨간색 계열로 표시한다.
    const missingChild = isChild && missingAcctNames.has(r.label);
    const missingType = !isChild && r.label!=='전체' && missingAcctTypes.has(r.label);
    const rowStyle = missingChild
      ? 'background:var(--danger-bg); border-left:4px solid var(--danger);'
      : (missingType ? 'border-left:4px solid var(--danger);' : (isChild ? 'background:var(--surface-1);' : ''));
    return `<tr ${clickable?`style="cursor:pointer; ${rowStyle}" onclick="${onRowClickFnName}('${r.label}')"`:`style="${rowStyle}"`}>
      <td style="font-weight:${isChild?'normal':'bold'}; ${isChild?'padding-left:26px; font-size:12px; color:'+(missingChild?'var(--danger)':'var(--text-secondary)')+';':(missingType?'color:var(--danger);':'')}">${isChild?'└ ':''}${r.label}${arrow}${missingChild||missingType?' ⚠':''}</td>
      <td style="text-align:right;">${amtOrMask(r.asset)}</td>
      ${midCats.map(m=>`<td style="background:var(--accent-bg); text-align:right;">${r.midWeights[m]!=null ? (Math.round(r.midWeights[m]*1000)/10)+'%' : '-'}</td>`).join('')}
      ${regions.map(rg=>`<td style="background:var(--warn-bg); text-align:right;">${r.regionWeights[rg]!=null ? (Math.round(r.regionWeights[rg]*1000)/10)+'%' : '-'}</td>`).join('')}
    </tr>`;
  };
  return `
    <div class="panel" style="overflow-x:auto;">
      <div class="row between" style="margin-bottom:8px; align-items:center;">
        <p style="margin:0; font-weight:bold; font-size:13px;">📂 '${major}' 대분류 상세 — 중분류별/지역별 비중은 '${major}' 내 합계 100% 기준</p>
        <button onclick="state.majorDrill=null; renderAccount();">◀ 전체 보기</button>
      </div>
      <table class="crud-table" style="white-space:nowrap;">
        <thead>
          <tr>
            <th rowspan="2" style="vertical-align:bottom;">계좌종류</th>
            <th rowspan="2" style="vertical-align:bottom; text-align:right;">${major} 자산</th>
            <th colspan="${midCats.length}" style="background:var(--accent-bg); text-align:center;">중분류별</th>
            <th colspan="${regions.length}" style="background:var(--warn-bg); text-align:center;">투자지역별</th>
          </tr>
          <tr>
            ${midCats.map(c=>`<th style="background:var(--accent-bg); font-size:11px; text-align:right;">${c}</th>`).join('')}
            ${regions.map(r=>`<th style="background:var(--warn-bg); font-size:11px; text-align:right;">${r}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
        ${rows.map(r=>{
          let html = renderDataRow(r, false);
          if(r.children){
            html += r.children.length
              ? r.children.map(c=>renderDataRow(c, true)).join('')
              : `<tr style="background:var(--surface-1);"><td colspan="${colCount}" class="muted" style="padding-left:26px; font-size:12px;">해당 계좌종류에 계좌가 없습니다.</td></tr>`;
          }
          return html;
        }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

const STOCK_NUMERIC_KEYS = new Set(['수량','구매단가','구매금액','평가금액','수익률','비중']);
// 상세 조회(계좌별로 나뉜) 화면의 컬럼. 종목별 합산 화면과 달리 보유계좌가 포함된다.
const STOCK_DETAIL_COLUMNS = [

  {key:'종목명', label:'종목명'}, {key:'수익률', label:'수익률'},
  {key:'수량', label:'수량'}, {key:'구매단가', label:'구매단가'}, {key:'구매금액', label:'구매금액'},
  {key:'평가금액', label:'평가금액'}, {key:'비중', label:'비중'}, {key:'보유계좌', label:'보유계좌'}
];
// 종목별 합산 화면의 컬럼. 동일 종목을 보유계좌 합산했으므로 보유계좌 컬럼은 없다.
const STOCK_AGG_COLUMNS = [
  {key:'대분류', label:'대분류'}, {key:'중분류', label:'중분류'}, {key:'국가', label:'국가'},
  {key:'종목명', label:'종목명'}, {key:'수익률', label:'수익률'},
  {key:'수량', label:'수량'}, {key:'구매단가', label:'구매단가'}, {key:'구매금액', label:'구매금액'},
  {key:'평가금액', label:'평가금액'}, {key:'비중', label:'비중'}
];

// 대분류/중분류 등 문자열 키와 수량/평가금액 등 숫자 키를 모두 처리하는 공용 정렬 함수.
function sortStockRows(rows, sortState){
  const {key, dir} = sortState;
  return [...rows].sort((a,b)=>{
    const av = a[key], bv = b[key];
    if(av==null && bv==null) return 0;
    if(av==null) return 1;
    if(bv==null) return -1;
    if(STOCK_NUMERIC_KEYS.has(key)) return dir==='desc' ? bv - av : av - bv;
    return dir==='desc' ? String(bv).localeCompare(String(av), 'ko') : String(av).localeCompare(String(bv), 'ko');
  });
}
function stockNameSuggestions(query){
  if(!query || !query.trim()) return [];
  const q = query.trim().toLowerCase();
  const names = Array.from(new Set(loadStockMaster().map(s=>s.종목명).filter(Boolean)));
  return names.filter(n=> n.toLowerCase().includes(q) && n.toLowerCase()!==q).sort().slice(0,8);
}

// 종목 화면의 검색/필터/정렬 조건에 맞게 표시할 행을 계산한다 (전체 렌더링과 부분 갱신에서 공유).
function computeStockRows(){
  const acctCodeSet0 = new Set(getAccountsForMember(state.member).map(a=>a.계좌코드));
  // '전체' 구성원이어도 명시적으로 등록된 계좌 코드 집합으로 필터링(홈 화면과 동일한 기준으로 통일)
  const memberFilterSet = acctCodeSet0;
  const dateISO = state.stockDate || latestDate(memberFilterSet) || todayISO();
  const acctMap = new Map(loadAccountMaster().map(a=>[a.계좌코드, a]));
  const stockMap = new Map(loadStockMaster().map(s=>[s.종목코드, s]));

  // snapshotAt은 조회월(dateISO가 속한 달)에 정확히 입력된 데이터만 가져온다.
  // 해당 월에 데이터가 없는 종목은 목록에서 자연히 제외된다(0 처리와 동일한 효과).
  let rows = snapshotAt(dateISO, memberFilterSet).map(h=>{
    const st = stockMap.get(h.종목코드) || {};
    const acc = acctMap.get(h.계좌코드) || {};
    const ret = h.매입평균단가 ? (h.종가 - h.매입평균단가) / h.매입평균단가 : null;
    return {
      종목코드: h.종목코드,
      증권사: acc.증권사 || '', 계좌종류: acc.계좌종류 || '',
      대분류: st.대분류 || '미분류', 중분류: st.중분류 || '', 국가: st.국가 || '',
      종목명: st.종목명 || h.종목코드,
      보유계좌: acc.계좌명 || h.계좌코드,
      수량: h.수량, 구매단가: h.매입평균단가, 구매금액: (h.수량||0)*(h.매입평균단가||0),
      평가금액: valueOf(h), 수익률: ret
    };
  });

  if(state.stockFilter.broker!=='전체') rows = rows.filter(r=> r.증권사===state.stockFilter.broker);
  if(state.stockFilter.acctType!=='전체') rows = rows.filter(r=> r.계좌종류===state.stockFilter.acctType);
  if(state.stockFilter.major!=='전체') rows = rows.filter(r=> r.대분류===state.stockFilter.major);
  if(state.stockFilter.mid!=='전체') rows = rows.filter(r=> r.중분류===state.stockFilter.mid);
  if(state.stockFilter.country!=='전체') rows = rows.filter(r=> r.국가===state.stockFilter.country);
  if(state.stockFilter.account!=='전체') rows = rows.filter(r=> r.보유계좌===state.stockFilter.account);

  if(state.stockSearch.trim()){
    const q = state.stockSearch.trim().toLowerCase();
    rows = rows.filter(r=> r.종목명.toLowerCase().includes(q));
  }

  // 비중(%)은 현재 필터·검색이 적용된 결과의 평가금액 합계를 100%로 계산한다.
  // (상세 조회 화면·종목별 합산 화면 모두 이 기준을 공유한다.)
  const totalVal = sum(rows.map(r=>r.평가금액));
  rows = rows.map(r=> ({...r, 비중: totalVal ? r.평가금액/totalVal : 0}));

  // 정렬은 화면(합산/상세)에 따라 renderStock에서 별도로 적용한다.
  return { rows, dateISO };
}
// 계좌별로 나뉜 rows(현재 조회조건이 적용된 결과)를 종목코드 기준으로 합산한다.
// 같은 종목이 여러 계좌에 걸쳐 있어도 하나의 행으로 묶고, 구매단가·수익률은 합산된 금액 기준으로 재계산한다.
// 비중(%)은 여기 넘어온 rows(=현재 조회조건이 반영된 결과)의 평가금액 합계를 100%로 보고 계산한다.
function aggregateStockRows(rows){
  const map = new Map();
  rows.forEach(r=>{
    const key = r.종목코드 || r.종목명;
    if(!map.has(key)){
      map.set(key, { 종목코드:key, 대분류:r.대분류, 중분류:r.중분류, 국가:r.국가, 종목명:r.종목명, 수량:0, 구매금액:0, 평가금액:0 });
    }
    const g = map.get(key);
    g.수량 += (r.수량||0);
    g.구매금액 += (r.구매금액||0);
    g.평가금액 += (r.평가금액||0);
  });
  const groups = Array.from(map.values());
  const totalVal = sum(groups.map(g=>g.평가금액));
  return groups.map(g=>({
    ...g,
    구매단가: g.수량 ? g.구매금액/g.수량 : null,
    수익률: g.구매금액 ? (g.평가금액-g.구매금액)/g.구매금액 : null,
    비중: totalVal ? g.평가금액/totalVal : 0
  })).sort((a,b)=> b.평가금액-a.평가금액);
}
function stockAggRowsHtml(rows){

/* ===================== 구성원 화면 ===================== */
const MEMBER_NUMERIC_KEYS = new Set(['자산총액','순투입원금','기간수익률','기간배당금','기간배당율']);
const MEMBER_COLUMNS = [
  {key:'구성원', label:'구성원'}, {key:'자산총액', label:'자산총액'}, {key:'순투입원금', label:'순투입원금'},
  {key:'기간수익률', label:'기간수익률'}, {key:'기간배당금', label:'기간배당금'}, {key:'기간배당율', label:'기간배당율'}
];
function toggleMemberSort(key){
  if(state.memberSort.key===key){ state.memberSort.dir = state.memberSort.dir==='desc' ? 'asc' : 'desc'; }
  else{ state.memberSort = {key, dir:MEMBER_NUMERIC_KEYS.has(key) ? 'desc' : 'asc'}; }
  renderMember();
}
function computeMemberRow(member, start, end){
  const accts = getAccountsForMember(member);
  const codeSet = new Set(accts.map(a=>a.계좌코드));
  const s = computeStats(codeSet, start, end);
  return { 구성원:member, 자산총액:s.endValue, 순투입원금:s.principal, 기간수익률:s.ret, 기간배당금:s.divs, 기간배당율:s.divYield };
}
function goToMemberHome(member){
  state.member = member;
  state.screen = 'home';
  renderAll();
}
function renderMember(){
  const main = document.getElementById('main');
  const members = allMembers();
  const {start, end} = periodRange(null);
  const amtOrMask = (n)=> state.ratioOnly ? '<span class="muted">••••</span>' : won(n);
  const sortArrow = (k)=> state.memberSort.key===k ? (state.memberSort.dir==='desc' ? ' ▼' : ' ▲') : '';

  let bodyHtml;
  if(!members.length){
    bodyHtml = `<div class="warn-box">⚠ 등록된 구성원이 없습니다. 관리항목 &gt; 기준정보 관리에서 구성원을 추가해주세요.</div>`;
  } else {
    let rows = members.map(m=>computeMemberRow(m, start, end));
    const {key, dir} = state.memberSort;
    rows.sort((a,b)=>{
      const av = a[key], bv = b[key];
      if(av==null && bv==null) return 0;
      if(av==null) return 1;
      if(bv==null) return -1;
      if(MEMBER_NUMERIC_KEYS.has(key)) return dir==='desc' ? bv - av : av - bv;
      return dir==='desc' ? String(bv).localeCompare(String(av), 'ko') : String(av).localeCompare(String(bv), 'ko');
    });
    const totalRow = computeMemberRow('전체', start, end);
    bodyHtml = `
      <div class="panel" style="padding:0; overflow:auto;">
        <table class="crud-table">
          <thead>
            <tr>
              ${MEMBER_COLUMNS.map(c=>`<th style="${c.key!=='구성원'?'text-align:right;':''} cursor:pointer;" onclick="toggleMemberSort('${c.key}')">${c.label}${sortArrow(c.key)}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${rows.map(r=>`
              <tr style="cursor:pointer;" onclick="goToMemberHome('${r.구성원}')">
                <td style="font-weight:bold;">${r.구성원} ›</td>
                <td style="text-align:right;">${amtOrMask(r.자산총액)}</td>
                <td style="text-align:right;">${amtOrMask(r.순투입원금)}</td>
                <td style="text-align:right;" class="${r.기간수익률>0?'value up':r.기간수익률<0?'value down':''}">${pct(r.기간수익률)}</td>
                <td style="text-align:right;">${amtOrMask(r.기간배당금)}</td>
                <td style="text-align:right;" class="${r.기간배당율>0?'value up':''}">${pct(r.기간배당율)}</td>
              </tr>
            `).join('')}
            <tr style="font-weight:bold; border-top:2px solid var(--border-strong);">
              <td>합계</td>
              <td style="text-align:right;">${amtOrMask(totalRow.자산총액)}</td>
              <td style="text-align:right;">${amtOrMask(totalRow.순투입원금)}</td>
              <td style="text-align:right;" class="${totalRow.기간수익률>0?'value up':totalRow.기간수익률<0?'value down':''}">${pct(totalRow.기간수익률)}</td>
              <td style="text-align:right;">${amtOrMask(totalRow.기간배당금)}</td>
              <td style="text-align:right;" class="${totalRow.기간배당율>0?'value up':''}">${pct(totalRow.기간배당율)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    `;
  }

  main.innerHTML = `
    <div class="row between" style="margin-bottom:10px;">
      <h2 style="margin:0;">구성원별 비교</h2>
      <button onclick="toggleRatioOnly(renderMember);">
        ${state.ratioOnly ? '👁 금액 표시' : '🙈 비율만 보기'}
      </button>
    </div>
    <div class="row" style="margin-bottom:14px;">
      ${['1개월','3개월','1년','전체'].map(p=>`<span class="chip ${state.periodPreset===p?'active':''}" onclick="state.periodPreset='${p}'; renderMember();">${p}</span>`).join('')}
      <span class="chip ${state.periodPreset==='직접'?'active':''}" onclick="state.periodPreset='직접'; renderMember();">📅 기간 직접 선택</span>
      ${state.periodPreset==='직접' ? `
        <input type="month" value="${monthKey(state.customStart||start)}" onchange="state.customStart=monthEndDate(this.value); renderMember();">
        ~
        <input type="month" value="${monthKey(state.customEnd||end)}" onchange="state.customEnd=monthEndDate(this.value); renderMember();">
      ` : ''}
      <span class="muted" style="margin-left:auto;">기준일 ${monthKey(end)}</span>
    </div>
    ${bodyHtml}
  `;
}

/* ===================== 개별입력 화면 ===================== */
function holdKeyOf(h){ return h.기준일자+'|'+h.계좌코드+'|'+h.종목코드; }
function cfKeyOf(c){ return c.날짜+'|'+c.계좌코드+'|'+c.구분+'|'+c.금액+'|'+c.메모; }
function loadManualHoldings(){ return loadHoldings().filter(h=>h.출처==='manual'); }
function loadManualCashflows(){ return loadCashflows().filter(c=>c.출처==='manual'); }

// 홈/계좌/종목/구성원 화면은 state.periodPreset이 '직접'(기간 직접 선택)일 때 customStart~customEnd 범위만 조회한다.
// 예전에 설정해둔 customEnd가 오늘보다 과거라면, 방금 입력한 내역이 조회 범위 밖으로 밀려나 집계에 반영되지 않은 것처럼 보일 수 있다.
// 이를 막기 위해 개별입력 저장 시점의 날짜가 현재 조회 기간 밖이면 기본 기간(1개월)으로 자동 리셋한다.
function ensurePeriodIncludesDate(dateISO){
  if(state.periodPreset === '직접' && state.customEnd && dateISO > state.customEnd){
    state.periodPreset = '1개월';
    state.customStart = null;
    state.customEnd = null;
  }
}

function setManualTab(tab){ state.manualTab = tab; renderManual(); }

function resetManualHoldForm(){
  state.manualHold = {기준일자:null, 계좌코드:'', 대분류:'', 중분류:'', 종목코드:'', 수량:'', 매입평균단가:'', 종가:'', 배당금:'', 메모:'', editKey:null};
}
function saveManualHolding(){
  const f = state.manualHold;
  if(!f.계좌코드 || !f.종목코드){ toast('계좌명과 종목명을 선택해주세요.'); return; }
  const qty = num(parseThousands(f.수량));
  if(qty<=0){ toast('수량을 입력해주세요.'); return; }
  const entry = {
    기준일자: f.기준일자 || monthEndDate(todayISO().slice(0,7)), 계좌코드: f.계좌코드, 종목코드: f.종목코드,
    수량: qty, 매입평균단가: num(parseThousands(f.매입평균단가)), 종가: num(parseThousands(f.종가)),
    배당금: num(parseThousands(f.배당금)), 메모: f.메모 || '', 출처:'manual'
  };
  const newKey = holdKeyOf(entry);
  let list = loadHoldings();
  if(f.editKey && f.editKey !== newKey){
    list = list.filter(h=>holdKeyOf(h)!==f.editKey);
  }
  const idx = list.findIndex(h=>holdKeyOf(h)===newKey);
  if(idx>=0) list[idx] = entry; else list.push(entry);
  save(LS.holdings, list);
  ensurePeriodIncludesDate(entry.기준일자);
  toast('보유현황이 저장되었습니다.');
  resetManualHoldForm();
  renderManual();
}
function editManualHolding(key){
  const h = loadHoldings().find(x=>holdKeyOf(x)===key);
  if(!h) return;
  const st = loadStockMaster().find(s=>s.종목코드===h.종목코드) || {};
  state.manualHold = {
    기준일자: h.기준일자, 계좌코드: h.계좌코드, 대분류: st.대분류||'', 중분류: st.중분류||'', 종목코드: h.종목코드,
    수량: h.수량, 매입평균단가: h.매입평균단가, 종가: h.종가, 배당금: h.배당금, 메모: h.메모||'',
    editKey: key
  };
  renderManual();
}
function deleteManualHolding(key){
  if(!confirm('이 항목을 삭제할까요?')) return;
  save(LS.holdings, loadHoldings().filter(h=>holdKeyOf(h)!==key));
  renderManual();
}

  const newKey = cfKeyOf(entry);
  let list = loadCashflows();
  if(f.editKey && f.editKey !== newKey){
    list = list.filter(c=>cfKeyOf(c)!==f.editKey);
  }

function editManualCashflow(key){

  ];
  main.innerHTML = `
    <div class="tabbar">
      ${tabs.map(t=>`<div class="tab ${state.settingsTab===t.id?'active':''}" onclick="state.settingsTab='${t.id}'; renderSettings();">${t.label}</div>`).join('')}
    </div>
    <div id="settingsPanel"></div>
  `;
  const panel = document.getElementById('settingsPanel');
  if(state.settingsTab==='ref') panel.innerHTML = refPanel();

  if(state.settingsTab==='export') panel.innerHTML = exportPanel();
  if(state.settingsTab==='reset') panel.innerHTML = resetPanel();

      <p style="margin:0 0 8px; font-weight:bold; font-size:13px;">${title}</p>
      <table class="crud-table">

        ${values.map(v=>`
          <tr><td>${v}</td><td style="text-align:right;">
            <button class="icon-btn" onclick="if(confirm('${v} 항목을 삭제할까요?')){ ${removeFnName}('${v}'); renderSettings(); }">🗑</button>
          </td></tr>
        `).join('') || `<tr><td colspan="2" class="muted">등록된 항목이 없습니다.</td></tr>`}

function targetCatList(targets){
  return Array.from(new Set([...Object.keys(targets), ...allMajorCats()])).sort();
}
function targetCatSum(){
  let total = 0;
  document.querySelectorAll('input[id^="target_"]').forEach(el=>{ total += num(el.value); });
  return total;
}
function recalcTargetSum(){
  const total = targetCatSum();
  const sumEl = document.getElementById('targetSumDisplay');
  if(sumEl){
    sumEl.textContent = `합계 ${total}%`;
    sumEl.style.color = total > 100 ? 'var(--danger)' : (total === 100 ? 'var(--success)' : 'var(--warn)');
  }
  const warnEl = document.getElementById('targetSumWarn');
  if(warnEl){
    if(total > 100){
      warnEl.style.display = 'block';
      warnEl.textContent = `⚠ 합계가 100%를 초과했습니다 (현재 ${total}%). 비중을 줄여주세요.`;
    } else {
      warnEl.style.display = 'none';
    }
  }
}
function targetPanel(){
  const targets = loadTargets();
  const cats = targetCatList(targets);
  const total = cats.reduce((s,c)=>s+num(targets[c]||0),0);
  return `
    <div class="panel">
      <div class="row between" style="margin:0 0 10px;">
        <span class="muted">대분류별 목표 비중</span>
        <span id="targetSumDisplay" style="font-size:13px; font-weight:bold; color:${total>100?'var(--danger)':(total===100?'var(--success)':'var(--warn)')};">합계 ${total}%</span>
      </div>
      <div id="targetSumWarn" class="warn-box" style="display:${total>100?'block':'none'};">⚠ 합계가 100%를 초과했습니다 (현재 ${total}%). 비중을 줄여주세요.</div>
      ${cats.length ? cats.map(c=>`
        <div class="row" style="margin-bottom:8px;">
          <span style="width:70px; font-size:13px;">${c}</span>
          <input type="number" class="mini-input" style="max-width:90px;" id="target_${c}" value="${targets[c]||0}" min="0" max="100"
            oninput="recalcTargetSum()">
          <span class="muted">%</span>
        </div>
      `).join('') : '<div class="warn-box">⚠ 먼저 기준정보 관리 탭에서 대분류를 추가해주세요.</div>'}
      <p class="muted" style="margin:8px 0 0;">대분류 추가·삭제는 기준정보 관리 탭에서 합니다.</p>
      <button class="primary" style="margin-top:14px;" onclick="saveTargetsFromForm()">저장</button>
    </div>
  `;
}
function saveTargetsFromForm(){
  const targets = loadTargets();
  const cats = targetCatList(targets);
  const obj = {};
  cats.forEach(c=>{
    const el = document.getElementById('target_'+c);
    obj[c] = el ? num(el.value) : (targets[c]||0);
  });
  const total = cats.reduce((s,c)=>s+(obj[c]||0),0);
  saveTargets(obj);
  if(total > 100){
    toast(`⚠ 저장되었지만 합계가 100%를 초과했습니다 (현재 ${total}%).`);
  } else if(total !== 100){
    toast(`⚠ 저장되었지만 합계가 100%가 아닙니다 (현재 ${total}%).`);
  } else {
    toast('목표 비중이 저장되었습니다.');
  }
  renderSettings();
}

function exportToExcel(){
  const wb = XLSX.utils.book_new();
  const acctMap = new Map(loadAccountMaster().map(a=>[a.계좌코드, a]));
  const stockMap = new Map(loadStockMaster().map(s=>[s.종목코드, s]));

  const holdAoa = [['기준일자','계좌명','구성원','증권사','계좌종류','종목코드','종목명','대분류','중분류','국가','수량','매입평균단가','종가(1주)','배당금','메모']];
  loadHoldings().forEach(h=>{
    const a = acctMap.get(h.계좌코드) || {};
    const s = stockMap.get(h.종목코드) || {};
    holdAoa.push([
      formatShortMonth(h.기준일자), h.계좌코드, a.구성원||'', a.증권사||'', a.계좌종류||'',
      h.종목코드, s.종목명||'', s.대분류||'', s.중분류||'', s.국가||'',
      h.수량, h.매입평균단가, h.종가, h.배당금, h.메모||''
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(holdAoa), '보유현황');

  const cfAoa = [['날짜','계좌명','입출금','금액','메모']];
  loadCashflows().forEach(c=> cfAoa.push([formatShortMonth(c.날짜), c.계좌코드, c.구분, c.금액, c.메모||'']));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(cfAoa), '입출금');

  const filename = `투자관리_백업_${todayISO()}.xlsx`;
  XLSX.writeFile(wb, filename);
  toast(`${filename} 파일로 다운로드했습니다.`);
}

      <span><b>${title}</b><br><span class="muted" style="font-size:12px; line-height:1.5;">${desc}</span></span>
    </label>`;
  return `
    <div class="panel">
      <p style="margin:0 0 10px; font-weight:bold; font-size:14px; color:#e11d48;">⚠ 데이터 초기화</p>
      <p class="muted" style="margin:0 0 14px; line-height:1.6;">선택한 범위의 데이터가 삭제되며, 삭제 후에는 복구할 수 없습니다. 초기화 전 [관리항목 &gt; 다운로드]에서 반드시 백업해 두시기 바랍니다.</p>
      <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px;">
        ${radio('all', '① 전체 초기화', '구성원·증권사·계좌종류·대분류·중분류·국가 등 기준정보와 계좌 관리, 종목 관리, 목표비중 설정, 보유현황, 입출금까지 앱에 저장된 모든 데이터를 삭제합니다.')}
        ${radio('rawonly', '② 보유현황·입출금만 삭제', '기준정보, 계좌 관리, 종목 관리, 목표비중 설정은 그대로 유지하고, 보유현황과 입출금 raw data만 삭제합니다.')}
      </div>
      <div class="row">
        <button class="primary" style="background:#e11d48; border-color:#e11d48;" onclick="executeReset();">초기화 실행</button>
        <button onclick="state.resetOption=null; renderSettings();">초기화 취소</button>
      </div>
    </div>
  `;
}
function executeReset(){
  const opt = state.resetOption;
  if(!opt){ alert('먼저 초기화할 항목을 선택해주세요.'); return; }
  if(opt==='all'){
    if(!confirm('⚠ 정말로 모든 데이터를 초기화하시겠습니까?\n기준정보, 계좌/종목 관리, 목표비중 설정, 보유현황, 입출금 등 앱에 저장된 모든 자료가 삭제되며 복구할 수 없습니다.')) return;
    Object.values(LS).forEach(key=> localStorage.removeItem(key));
    toast('모든 데이터가 초기화되었습니다.');
  } else if(opt==='rawonly'){
    if(!confirm('⚠ 보유현황과 입출금 데이터를 삭제하시겠습니까?\n기준정보/계좌 관리/종목 관리/목표비중 설정은 유지되며, raw data와 불러오기 이력만 삭제되고 복구할 수 없습니다.')) return;
    localStorage.removeItem(LS.holdings);
    localStorage.removeItem(LS.cashflows);
    localStorage.removeItem(LS.lastImport);
    localStorage.removeItem(LS.importHistory);
    toast('보유현황·입출금 데이터가 초기화되었습니다.');
  }
  state.resetOption=null;
  renderSettings();
}

// PWA 서비스워커 등록: 오프라인에서도 앱 화면이 뜨도록 핵심 파일을 미리 저장해둔다.
// (file:// 로 직접 열었을 때는 브라우저 보안 정책상 서비스워커가 동작하지 않으므로,
//  이 부분은 GitHub Pages 같은 https 주소로 열었을 때만 정상 동작한다.)
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch((err) => {
      console.warn('서비스워커 등록 실패:', err);
    });
  });
}
</script>
</body>
